
tags:
  - Auth
summary: Refresh user session
operationId: refreshSession
description: 'Refreshes existing session using a refresh token. Returns a new access token.'
security: []
parameters:
  - in: cookie
    name: sessionId
    required: true
    schema:
      type: string
      example: '65e4decdd386b31065d54af8'
    description: 'ID of the current session'
  - in: cookie
    name: refreshToken
    required: true
    schema:
      type: string
      example: 'XyZ12AbC34DefGhI56JkLmNoP78QrStUvWxYz90AaBb'
    description: 'Refresh token'

responses:
  '200':
    description: 'Successfully refreshed a session!'
    headers:
      Set-Cookie:
        description: Cookies set after successful login.
        schema:
          type: array
          items:
            type: string
            example:
              - session_id=qwe123; Path=/; HttpOnly;
              - refresh_token=scf789; Path=/; HttpOnly;
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: 'Successfully refreshed a session!'
            data:
              type: object
              properties:
                accessToken:
                  type: string
                  example: 'XyZ12AbC34DefGhI56JkLmNoP78QrStUvWxYz90AaBb'

  '401':
    $ref: '../../components/responses/401.yaml'
