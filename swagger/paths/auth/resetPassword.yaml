tags:
  - Auth
summary: Reset user password
operationId: resetPassword
description: 'Resets a user password using a valid token from password reset email.'
security: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - token
          - password
        properties:
          token:
            type: string
            example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
            description: 'JWT token from password reset email.'
          password:
            type: string
            format: password
            example: 'johnCena2212'
            description: 'New password for the user.'
responses:
  '200':
    description: 'Password has been successfully reset.'
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: 'Password has been successfully reset.'
            data:
              type: object
  '401':
    $ref: '../../components/responses/401.yaml'
  '404':
    $ref: '../../components/responses/404.yaml'
