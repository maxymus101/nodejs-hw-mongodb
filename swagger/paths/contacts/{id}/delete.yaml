tags:
  - Contacts
summary: Delete contact by ID
operationId: deleteContact
description: 'Deletes a contact by its ID. Only owner can delete their contact.'
security:
  - bearerAuth: []
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
      example: '65ca67e7ae7f10c88b597544'
responses:
  '204':
    description: 'Contact successfully deleted.'
  '401':
    $ref: '../../../components/responses/401.yaml'
  '404':
    $ref: '../../../components/responses/404.yaml'
