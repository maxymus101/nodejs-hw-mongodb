tags:
  - Contacts
summary: Create contact
operationId: createContact
description: 'Create a contact with payload'
security:
  - bearerAuth: []
requestBody:
  content:
    multipart/form-data:
      schema:
        type: object
        required:
          - name
          - phoneNumber
          - contactType
        properties:
          name:
            description: "Contact's name"
            type: string
            example: 'John Cena'
          phoneNumber:
            description: "Phone number of contact."
            type: string
            example: "+380973242156"
          email:
            description: "Email address of contact."
            type: string
            example: "john_cena@email.com"
          isFavourite:
            description: "Indicates favourite contact."
            type: boolean
            example: false
          contactType:
            description: "Possible types of contact: 'work', 'home', 'personal'"
            type: string
            enum:
            - work
            - home
            - personal
            example: "personal"
          photo:
            description: "Contact's photo"
            type: string
            format: binary
responses:
  '201':
    description: Creates a contact
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 201
            message:
              type: string
              example: Successfully created a contact!
            data:
              type: object
              $ref: '../../components/schemas/contact.yaml'
  '401':
    $ref: '../../components/responses/401.yaml'
  '400':
    $ref: '../../components/responses/400.yaml'
